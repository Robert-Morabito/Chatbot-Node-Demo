<!DOCTYPE html>
<html>
<head>
    <title>Storage Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .test { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Storage System Debug</h1>
    
    <div class="test">
        <h2>1. Test GitHub Connection</h2>
        <button onclick="testGitHub()">Test Connection</button>
        <pre id="github-result"></pre>
    </div>
    
    <div class="test">
        <h2>2. Test Save Endpoint</h2>
        <button onclick="testSave()">Test Save</button>
        <pre id="save-result"></pre>
    </div>
    
    <script>
        async function testGitHub() {
            const resultEl = document.getElementById('github-result');
            try {
                const response = await fetch('/api/test-github');
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
                resultEl.parentElement.className = data.success ? 'test success' : 'test error';
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
                resultEl.parentElement.className = 'test error';
            }
        }
        
        async function testSave() {
            const resultEl = document.getElementById('save-result');
            try {
                const testData = {
                    participantId: 'TEST123',
                    sessionId: 'test_session_' + Date.now(),
                    conversations: {
                        '1': {
                            id: '1',
                            title: 'Test Conversation',
                            messages: [
                                { sender: 'User', content: 'Test message', timestamp: new Date() }
                            ]
                        }
                    },
                    modelConfig: {
                        displayedModel: 'GPT-4',
                        actualModel: 'gpt-4-turbo'
                    }
                };
                
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
                resultEl.parentElement.className = data.success ? 'test success' : 'test error';
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
                resultEl.parentElement.className = 'test error';
            }
        }
    </script>
</body>
</html>
